<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root { color-scheme: light dark; }
  body { max-width: 820px; margin: 0 auto; padding: 1rem 1.1rem 4rem;
         font: 16px/1.7 -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
         word-wrap: break-word; }
  h1,h2,h3 { line-height: 1.3; margin-top: 1.6em; }
  h1 { font-size: 1.5rem; } h2 { font-size: 1.25rem; border-bottom: 1px solid #8884; padding-bottom: .2em; }
  code { font-family: "SFMono-Regular", Menlo, Consolas, monospace; font-size: .9em; }
  :not(pre) > code { background: #8882; padding: .1em .35em; border-radius: 4px; }
  pre { background: #2b2b2b08; padding: .9rem; border-radius: 8px; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; }
  th,td { border: 1px solid #8886; padding: .4em .6em; text-align: left; }
  blockquote { border-left: 3px solid #8888; margin: 1em 0; padding: .2em 1em; color: #666; }
  a { color: #0a7; }
</style>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
    startup: { typeset: false }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
</head>
<body>
<nav style="max-width:820px;margin:0 auto 1rem;font-size:.88rem"><a href="index.html" style="color:#0a7;text-decoration:none">← 复习索引 / Study Index</a></nav>
<article id="out"></article>
<!-- 原始 markdown 嵌在下面;渲染器只替换 {{MARKDOWN}},内容里的 </script> 须转义为 <\/script> -->
<script id="doc" type="text/markdown">{{MARKDOWN}}</script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    const raw = document.getElementById('doc').textContent;
    // 保护 LaTeX,避免被 markdown 解析吃掉
    const math = [];
    const keep = (m) => { math.push(m); return `@@M${math.length - 1}@@`; };
    const protectedText = raw
      .replace(/\$\$([\s\S]+?)\$\$/g, keep)
      .replace(/\\\[([\s\S]+?)\\\]/g, keep)
      .replace(/\\\(([\s\S]+?)\\\)/g, keep)
      .replace(/\$([^\$\n]+?)\$/g, keep);
    let html = marked.parse(protectedText);
    html = html.replace(/@@M(\d+)@@/g, (_, i) => math[+i]);
    document.getElementById('out').innerHTML = html;
    document.querySelectorAll('pre code').forEach((b) => hljs.highlightElement(b));
    if (window.MathJax && MathJax.startup) {
      MathJax.startup.promise.then(() => MathJax.typesetPromise());
    }
  });
</script>
</body>
</html>
