<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<link rel="stylesheet" href="vendor/hl/github.min.css">
<link rel="stylesheet" href="vendor/hl/github-dark.min.css" media="(prefers-color-scheme: dark)">
<style>
  :root{
    color-scheme:light dark;
    --bg:#fdfcf7; --bg-soft:#f4f1ea; --bg-code:#f8f5ec; --ink:#2b2b2b; --ink-soft:#4a4a4a; --muted:#6b6b6b;
    --accent:#b8390e;  /* 赭红 — 加粗/强调/inline code */
    --primary:#1a4a8c; /* navy — 链接/H3/表头/代码边条 */
    --line:#8884; --border:#d6d0c0; --border-soft:#e8e3d5;
    --thead-bg:#1a4a8c; --thead-fg:#ffffff;
    --c-info-bg:#dbeafe; --c-info:#1a4a8c;
    --c-warn-bg:#fef3c7; --c-warn:#b45309;
    --c-good-bg:#d1fae5; --c-good:#065f46;
    --c-bad-bg:#fee2e2;  --c-bad:#991b1b;
  }
  body{margin:0;padding:0;background:var(--bg);color:var(--ink);
       font:16px/1.75 Georgia,"Iowan Old Style","Songti SC","Noto Serif CJK SC","STSong",serif;word-wrap:break-word}
  h1,h2,h3,h4{line-height:1.3;margin-top:1.6em;color:#1a1a1a;font-weight:700}
  h1{font-size:1.55rem}
  h2{font-size:1.32rem;border-bottom:1px solid var(--border);padding-bottom:.25em;margin-top:1.9em}
  h3{font-size:1.1rem;color:var(--primary)}
  strong{color:var(--accent)}
  em{color:var(--ink-soft)}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}
  code{font-family:"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;font-size:.88em}
  :not(pre)>code{background:var(--bg-code);color:var(--accent);padding:.1em .4em;border-radius:3px;border:1px solid var(--border-soft)}
  pre{margin:1em 0;background:var(--bg-code);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:4px;overflow-x:auto}
  pre code.hljs{background:transparent!important;border-radius:0}
  pre.diagram{background:#f9f6ed;border-left-color:var(--accent);font-size:.9em;line-height:1.45}
  table{border-collapse:collapse;width:100%;display:block;overflow-x:auto;font-size:.92rem;border:1px solid var(--border)}
  thead{background:var(--thead-bg);color:var(--thead-fg)}
  th,td{padding:.5em .7em;text-align:left;vertical-align:top;border-bottom:1px solid var(--border-soft)}
  th{font-weight:600;font-size:.9rem;letter-spacing:.02em}
  tbody tr:nth-child(even){background:var(--bg-soft)}
  tbody tr:last-child td{border-bottom:none}
  blockquote{border-left:3px solid var(--border);margin:1em 0;padding:.3em 1em;color:var(--muted);background:#0000000a;border-radius:0 6px 6px 0}
  nav.top{max-width:1080px;margin:1rem auto .4rem;padding:0 1.1rem;font-size:.88rem;font-family:system-ui,sans-serif;display:flex;justify-content:space-between;align-items:center;gap:1rem}
  .lang-toggle{flex:none;border:1px solid var(--border);border-radius:999px;padding:.12em .7em;color:var(--primary);font-size:.82rem;white-space:nowrap}
  .lang-toggle:hover{background:var(--bg-soft);text-decoration:none}
  /* 提示框 (emoji 触发, 构建时包裹) */
  .callout{border-left:4px solid;border-radius:4px;padding:.6em 1em;margin:1.1em 0;font-size:.97em}
  .callout>:first-child{margin-top:0}
  .callout>:last-child{margin-bottom:0}
  .callout-info{border-left-color:var(--c-info);background:var(--c-info-bg)}
  .callout-warn{border-left-color:var(--c-warn);background:var(--c-warn-bg)}
  .callout-good{border-left-color:var(--c-good);background:var(--c-good-bg)}
  .callout-bad{border-left-color:var(--c-bad);background:var(--c-bad-bg)}
  .callout-label{font:700 .72rem/1.4 system-ui,"PingFang SC","Microsoft YaHei",sans-serif;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3em}
  .callout-info .callout-label{color:var(--c-info)}
  .callout-warn .callout-label{color:var(--c-warn)}
  .callout-good .callout-label{color:var(--c-good)}
  .callout-bad .callout-label{color:var(--c-bad)}
  /* 折叠 Q&A (问题在 summary, 答案默认折叠) */
  details:not(.toc):not(.code-fold){border:1px solid var(--line);border-radius:8px;margin:.6em 0;background:var(--bg-soft);padding:0 .9em}
  details:not(.toc):not(.code-fold)>summary{cursor:pointer;font-weight:600;color:var(--primary);padding:.55em .1em;list-style:none;font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif}
  details:not(.toc):not(.code-fold)>summary::-webkit-details-marker{display:none}
  details:not(.toc):not(.code-fold)>summary::before{content:"▸ ";color:var(--accent)}
  details:not(.toc):not(.code-fold)[open]>summary::before{content:"▾ "}
  details:not(.toc):not(.code-fold)[open]>summary{border-bottom:1px solid var(--line);margin-bottom:.5em}
  details:not(.toc):not(.code-fold)>:not(summary):last-child{margin-bottom:.7em}
  /* 折叠长代码 */
  .code-fold{margin:1em 0}
  .code-fold>summary{cursor:pointer;color:var(--primary);font-size:.85rem;padding:.25em 0;list-style:none;font-family:system-ui,sans-serif}
  .code-fold>summary::-webkit-details-marker{display:none}
  .code-fold>summary::before{content:"▸ 展开代码 · "}
  .code-fold[open]>summary::before{content:"▾ 收起代码 · "}
  .code-fold pre{margin:.3em 0}
  /* ARIS 式 hero 页头: eyebrow 小标签 + 大标题 + 副标题 + 双线 (标题从正文 H1 提升至此) */
  .hero{max-width:1080px;margin:1.1rem auto .2rem;padding:0 1.1rem}
  body.no-toc .hero{max-width:820px}
  .hero .eyebrow{font:400 .82rem/1.4 system-ui,"PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:.01em;color:var(--muted);margin-bottom:.4em}
  .hero-title{font-size:2rem;line-height:1.2;margin:.1rem 0 .25rem;color:#1a1a1a;font-weight:700;letter-spacing:-.01em}
  .hero-sub{font:italic 400 1.05rem/1.5 Georgia,"Songti SC","Noto Serif CJK SC",serif;color:var(--ink-soft);margin:.1rem 0 .55rem}
  .hero-rule{border-top:3px double var(--primary);margin:.4rem 0 0}
  /* 两栏: 左 sticky 侧栏 TOC + 正文; ≤900px 折成单栏、TOC 移到顶部; scrollspy 高亮当前节 */
  .layout{max-width:820px;margin:0 auto;padding:0 1.1rem 4rem;display:grid;grid-template-columns:1fr}
  body:not(.no-toc) .layout{max-width:1080px;grid-template-columns:220px minmax(0,1fr);gap:36px;align-items:start}
  main#out{min-width:0}
  nav.toc{position:sticky;top:1rem;align-self:start;max-height:calc(100vh - 2rem);overflow:auto;font-size:.85rem;font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif;border-right:1px solid var(--line);padding:.2em 14px 0 0}
  nav.toc .toc-h{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;margin-bottom:.6em}
  nav.toc ul{list-style:none;padding:0;margin:0}
  nav.toc li{margin:.18em 0}
  nav.toc li.lv3{padding-left:1em;font-size:.95em;opacity:.8}
  nav.toc a{color:var(--muted);text-decoration:none;border-left:2px solid transparent;padding-left:.55em;display:block;line-height:1.4}
  nav.toc a:hover{color:var(--primary)}
  nav.toc a.active{color:var(--accent);border-left-color:var(--accent);font-weight:600}
  @media (max-width:900px){
    body:not(.no-toc) .layout{grid-template-columns:1fr;gap:0}
    nav.toc{position:static;max-height:none;overflow:visible;border-right:none;border-bottom:1px solid var(--line);padding:0 0 .7em;margin-bottom:1.2em}
  }
  /* 引用 (gwern/Tufte 式, 零 JS): [N] 上标可点跳底部; .cite-note gist 宽屏(≥1180px)浮右页边、窄屏隐藏 */
  .cite-wrap{display:inline}
  .cite{color:var(--primary);font-weight:600;font-size:.72em;vertical-align:super;padding:0 .12em;white-space:nowrap;text-decoration:none}
  .cite::before{content:"["}
  .cite::after{content:"]"}
  .cite:hover{text-decoration:underline}
  .cite-note{display:none}
  ol.refs{font-size:.95rem;padding-left:1.6em}
  ol.refs li{margin:.4em 0}
  ol.refs li:target{background:#b8390e1a;border-radius:4px}
  .katex-display{overflow-x:auto;overflow-y:hidden;padding:.2em 0}
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#16181c; --bg-soft:#22262c; --bg-code:#1d2025; --ink:#dcdcdc; --ink-soft:#aeb7bf; --muted:#9aa6b0;
      --accent:#e8845c; --primary:#7fb0e8; --line:#ffffff33; --border:#ffffff26; --border-soft:#ffffff14;
      --thead-bg:#25406a; --thead-fg:#eaf2fb;
      --c-info-bg:#7fb0e81e; --c-info:#9cc4f0;
      --c-warn-bg:#d9a52614; --c-warn:#e0a83a;
      --c-good-bg:#2a7a4b1e; --c-good:#5fc080;
      --c-bad-bg:#b8390e1e;  --c-bad:#e8845c;
    }
    h1,h2,h4,.hero-title{color:#ededed}  /* h3 keeps var(--primary) (navy) */
    blockquote{background:#ffffff0a}
    pre.diagram{background:#23262b}
  }
  @media print{
    nav.toc,nav.top{display:none}
    body:not(.no-toc) .layout{grid-template-columns:1fr;max-width:none}
    body{background:#fff;color:#000}
    .hero-rule{border-top-color:#000}
    .callout,pre,table,details{break-inside:avoid}
  }
  /* (引用 gist 右页边浮动已移除以让位左侧栏 TOC; [N] 仍跳底部 refs, gist 文本在书目里不丢) */
</style>
</head>
<body class="{{BODYCLASS}}">
<nav class="top"><a href="index.html">{{BACK}}</a>{{ALT_LINK}}</nav>
{{HERO}}
<div class="layout">
{{TOC}}
<main id="out">{{CONTENT}}</main>
</div>
<script>
(function(){
  var links=[].slice.call(document.querySelectorAll('nav.toc a'));
  if(!links.length||!('IntersectionObserver' in window))return;
  var byId={};
  links.forEach(function(a){byId[a.getAttribute('href').replace(/^#/,'')]=a;});
  var io=new IntersectionObserver(function(es){
    es.forEach(function(e){
      if(!e.isIntersecting)return;
      links.forEach(function(l){l.classList.remove('active');});
      var a=byId[e.target.id];if(a)a.classList.add('active');
    });
  },{rootMargin:'-12% 0px -75% 0px'});
  links.forEach(function(a){var el=document.getElementById(a.getAttribute('href').replace(/^#/,''));if(el)io.observe(el);});
})();
(function(){
  // Print degradation: force every collapsed <details> open while printing, restore after.
  var stash=[];
  window.addEventListener('beforeprint',function(){
    stash=[];
    document.querySelectorAll('details:not([open])').forEach(function(d){stash.push(d);d.open=true;});
  });
  window.addEventListener('afterprint',function(){
    stash.forEach(function(d){if(d.isConnected)d.open=false;});stash=[];
  });
})();
</script>
</body>
</html>
