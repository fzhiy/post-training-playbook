<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<link rel="stylesheet" href="vendor/hl/github.min.css">
<link rel="stylesheet" href="vendor/hl/github-dark.min.css" media="(prefers-color-scheme: dark)">
<style>
  :root{
    color-scheme:light dark;
    --bg:#fdfcf7; --bg-soft:#f4f1ea; --ink:#2b2b2b; --muted:#6b6b6b;
    --accent:#b8390e;  /* 赭红 — 加粗/强调 */
    --primary:#1a4a8c; /* navy — 链接/代码边条 */
    --line:#8884;
  }
  body{margin:0;padding:0;background:var(--bg);color:var(--ink);
       font:16px/1.75 Georgia,"Iowan Old Style","Songti SC","Noto Serif CJK SC","STSong",serif;word-wrap:break-word}
  h1,h2,h3,h4{line-height:1.3;margin-top:1.6em;color:#1a1a1a;font-weight:700}
  h1{font-size:1.55rem}
  h2{font-size:1.25rem;border-bottom:2px solid var(--accent);padding-bottom:.2em}
  h3{font-size:1.08rem}
  strong{color:var(--accent)}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}
  code{font-family:"SFMono-Regular",Menlo,Consolas,monospace;font-size:.88em}
  :not(pre)>code{background:#1a4a8c14;color:#0d3a6b;padding:.1em .35em;border-radius:4px}
  pre{margin:1em 0;border-left:4px solid var(--primary);border-radius:0 8px 8px 0;overflow:hidden}
  pre code.hljs{border-radius:0 8px 8px 0}
  table{border-collapse:collapse;width:100%;display:block;overflow-x:auto;font-size:.95rem}
  th,td{border:1px solid var(--line);padding:.4em .6em;text-align:left}
  th{background:var(--bg-soft)}
  blockquote{border-left:3px solid #b8b0a0;margin:1em 0;padding:.3em 1em;color:var(--muted);background:#0000000a;border-radius:0 6px 6px 0}
  nav.top{max-width:1080px;margin:1rem auto .4rem;padding:0 1.1rem;font-size:.88rem;font-family:system-ui,sans-serif}
  /* 提示框 (emoji 触发, 构建时包裹) */
  .callout{border-left:4px solid;border-radius:0 8px 8px 0;padding:.5em .9em;margin:1.1em 0;background:#00000008}
  .callout>:first-child{margin-top:0}
  .callout>:last-child{margin-bottom:0}
  .callout-info{border-color:#1a4a8c;background:#1a4a8c12}
  .callout-warn{border-color:#c77d00;background:#c77d0014}
  .callout-good{border-color:#1a7f4b;background:#1a7f4b12}
  .callout-bad{border-color:#b8390e;background:#b8390e10}
  .callout-label{font:700 .78rem/1.4 system-ui,"PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:.02em;margin-bottom:.25em}
  .callout-info .callout-label{color:#1a4a8c}
  .callout-warn .callout-label{color:#b5730a}
  .callout-good .callout-label{color:#1a7f4b}
  .callout-bad .callout-label{color:#b8390e}
  /* 折叠 Q&A (问题在 summary, 答案默认折叠) */
  details:not(.toc):not(.code-fold){border:1px solid var(--line);border-radius:8px;margin:.6em 0;background:var(--bg-soft);padding:0 .9em}
  details:not(.toc):not(.code-fold)>summary{cursor:pointer;font-weight:600;color:var(--primary);padding:.55em .1em;list-style:none;font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif}
  details:not(.toc):not(.code-fold)>summary::-webkit-details-marker{display:none}
  details:not(.toc):not(.code-fold)>summary::before{content:"▸ ";color:var(--accent)}
  details:not(.toc):not(.code-fold)[open]>summary::before{content:"▾ "}
  details:not(.toc):not(.code-fold)[open]>summary{border-bottom:1px solid var(--line);margin-bottom:.5em}
  details:not(.toc):not(.code-fold)>:not(summary):last-child{margin-bottom:.7em}
  /* 折叠长代码 */
  .code-fold{margin:1em 0}
  .code-fold>summary{cursor:pointer;color:var(--primary);font-size:.85rem;padding:.25em 0;list-style:none;font-family:system-ui,sans-serif}
  .code-fold>summary::-webkit-details-marker{display:none}
  .code-fold>summary::before{content:"▸ 展开代码 · "}
  .code-fold[open]>summary::before{content:"▾ 收起代码 · "}
  .code-fold pre{margin:.3em 0}
  /* ARIS 式 hero 页头: eyebrow 小标签 + 大标题 + 副标题 + 双线 (标题从正文 H1 提升至此) */
  .hero{max-width:1080px;margin:1.1rem auto .2rem;padding:0 1.1rem}
  body.no-toc .hero{max-width:820px}
  .hero .eyebrow{font:600 .72rem/1.4 system-ui,"PingFang SC","Microsoft YaHei",sans-serif;text-transform:uppercase;letter-spacing:.14em;color:var(--accent)}
  .hero-title{font-size:1.9rem;line-height:1.22;margin:.25rem 0 .12rem;color:#1a1a1a;font-weight:700}
  .hero-sub{font:400 1.02rem/1.5 Georgia,"Songti SC","Noto Serif CJK SC",serif;color:var(--muted);margin:.1rem 0 .55rem}
  .hero-rule{border-top:3px double var(--accent);margin:.3rem 0 0}
  /* 两栏: 左 sticky 侧栏 TOC + 正文; ≤900px 折成单栏、TOC 移到顶部; scrollspy 高亮当前节 */
  .layout{max-width:820px;margin:0 auto;padding:0 1.1rem 4rem;display:grid;grid-template-columns:1fr}
  body:not(.no-toc) .layout{max-width:1080px;grid-template-columns:220px minmax(0,1fr);gap:36px;align-items:start}
  main#out{min-width:0}
  nav.toc{position:sticky;top:1rem;align-self:start;max-height:calc(100vh - 2rem);overflow:auto;font-size:.85rem;font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif;border-right:1px solid var(--line);padding:.2em 14px 0 0}
  nav.toc .toc-h{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;margin-bottom:.6em}
  nav.toc ul{list-style:none;padding:0;margin:0}
  nav.toc li{margin:.18em 0}
  nav.toc li.lv3{padding-left:1em;font-size:.95em;opacity:.8}
  nav.toc a{color:var(--muted);text-decoration:none;border-left:2px solid transparent;padding-left:.55em;display:block;line-height:1.4}
  nav.toc a:hover{color:var(--primary)}
  nav.toc a.active{color:var(--accent);border-left-color:var(--accent);font-weight:600}
  @media (max-width:900px){
    body:not(.no-toc) .layout{grid-template-columns:1fr;gap:0}
    nav.toc{position:static;max-height:none;overflow:visible;border-right:none;border-bottom:1px solid var(--line);padding:0 0 .7em;margin-bottom:1.2em}
  }
  /* 引用 (gwern/Tufte 式, 零 JS): [N] 上标可点跳底部; .cite-note gist 宽屏(≥1180px)浮右页边、窄屏隐藏 */
  .cite-wrap{display:inline}
  .cite{color:var(--primary);font-weight:600;font-size:.72em;vertical-align:super;padding:0 .12em;white-space:nowrap;text-decoration:none}
  .cite::before{content:"["}
  .cite::after{content:"]"}
  .cite:hover{text-decoration:underline}
  .cite-note{display:none}
  ol.refs{font-size:.95rem;padding-left:1.6em}
  ol.refs li{margin:.4em 0}
  ol.refs li:target{background:#b8390e1a;border-radius:4px}
  .katex-display{overflow-x:auto;overflow-y:hidden;padding:.2em 0}
  @media(prefers-color-scheme:dark){
    :root{--bg:#16181c;--bg-soft:#22262c;--ink:#dcdcdc;--muted:#9aa6b0;--accent:#e8845c;--primary:#7fb0e8;--line:#ffffff33}
    h1,h2,h3,h4,.hero-title{color:#ededed}
    :not(pre)>code{background:#7fb0e820;color:#a9cdf5}
    blockquote{background:#ffffff0a}
    .callout{background:#ffffff0a}
    .callout-info .callout-label{color:#7fb0e8}
    .callout-warn .callout-label{color:#e0a83a}
    .callout-good .callout-label{color:#5fc080}
    .callout-bad .callout-label{color:#e8845c}
  }
  /* (引用 gist 右页边浮动已移除以让位左侧栏 TOC; [N] 仍跳底部 refs, gist 文本在书目里不丢) */
</style>
</head>
<body class="{{BODYCLASS}}">
<nav class="top"><a href="index.html">← 复习索引 / Study Index</a></nav>
{{HERO}}
<div class="layout">
{{TOC}}
<main id="out">{{CONTENT}}</main>
</div>
<script>
(function(){
  var links=[].slice.call(document.querySelectorAll('nav.toc a'));
  if(!links.length||!('IntersectionObserver' in window))return;
  var byId={};
  links.forEach(function(a){byId[a.getAttribute('href').replace(/^#/,'')]=a;});
  var io=new IntersectionObserver(function(es){
    es.forEach(function(e){
      if(!e.isIntersecting)return;
      links.forEach(function(l){l.classList.remove('active');});
      var a=byId[e.target.id];if(a)a.classList.add('active');
    });
  },{rootMargin:'-12% 0px -75% 0px'});
  links.forEach(function(a){var el=document.getElementById(a.getAttribute('href').replace(/^#/,''));if(el)io.observe(el);});
})();
</script>
</body>
</html>
